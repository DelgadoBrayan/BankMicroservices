version: '3.9'

services:

  # ── Databases ──────────────────────────────────────────────────────────────

  postgres-cliente:
    image: postgres:15-alpine
    container_name: postgres-cliente
    environment:
      POSTGRES_DB: client_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_cliente_data:/var/lib/postgresql/data
    networks:
      - banco-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-cuenta:
    image: postgres:15-alpine
    container_name: postgres-cuenta
    environment:
      POSTGRES_DB: account_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_cuenta_data:/var/lib/postgresql/data
    networks:
      - banco-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d account_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ──────────────────────────────────────────────────────────

  cliente-service:
    build:
      context: ./cliente-service
      dockerfile: Dockerfile
    container_name: cliente-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-cliente
      DB_PORT: 5432
      DB_NAME: client_service_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      postgres-cliente:
        condition: service_healthy
    networks:
      - banco-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  cuenta-service:
    build:
      context: ./cuenta-service
      dockerfile: Dockerfile
    container_name: cuenta-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-cuenta
      DB_PORT: 5432
      DB_NAME: account_service_db
      DB_USER: postgres
      DB_PASS: postgres
      CLIENTE_SERVICE_URL: http://cliente-service:8081
    depends_on:
      postgres-cuenta:
        condition: service_healthy
      cliente-service:
        condition: service_healthy
    networks:
      - banco-network
    restart: on-failure

# ── Volumes & Network ──────────────────────────────────────────────────────────

volumes:
  postgres_cliente_data:
  postgres_cuenta_data:

networks:
  banco-network:
    driver: bridge