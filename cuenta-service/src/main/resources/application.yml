server:
  port: 8082

spring:
  application:
    name: cuenta-service

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:account_service_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:1234}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:account_service_db}
    user: ${DB_USER:postgres}
    password: ${DB_PASS:1234}
    locations: classpath:db/migration
    enabled: true

services:
  cliente-service:
    base-url: ${CLIENTE_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.banco: DEBUG
    org.springframework.r2dbc: DEBUG